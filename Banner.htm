9pOhvUpDMqpV3T3e9vyHrf6fY+p26IlKrIIWgHTADTnu1tsM1Hn8DK/C3LNno1sAAAAAASUVORK5CYII=";

				// LOADING THE BACKGROUND IMAGE
				var image1 = new Image;
				image1.onload = update; // CALLING THE UPDATE FUNCTION WHEN THE IMAGE IS LOADED
				image1.src = backgroundImg;

				// LOADING THE APP LOGO
				var image2 = new Image;
				image2.onload = update; // CALLING THE UPDATE FUNCTION WHEN THE IMAGE IS LOADED
				image2.src = logoApp;

				// GETTING ALL THE ELEMENTS IN THE WEB FORM
				var name = document.getElementById("name");
				var slogan = document.getElementById("slogan");
				var canvas = document.getElementById("myCanvas");

				// FOCUSING THE SLOGAN
				slogan.focus();

				// CLEARING ALL THE INPUTTED VALUES (IF ANY)
				name.value = "Pixel Gym";
				slogan.value = "Easy, fast and free.";

				// USING A VARIABLE IN ORDER TO KNOW WHEN ALL THE GRAPHICAL ELEMENTS ARE LOADED
				var elementsLoadedCounter = 0;

				function update()
					{
					// INCREASING THE ELEMENT LOADED COUNTER
					elementsLoadedCounter++;

					// CHECKING IF THE RIGHT AMOUNT OF ELEMENTS ARE LOADED
					if (elementsLoadedCounter < 2)
						{
						// IF NOT, RETURNING WITHOUT EXECUTING ANYTHING ELSE
						return;
						}

					// GETTING THE CONTEXT
					var context = canvas.getContext("2d");

					// DRAWING THE BACKGROUND
					context.drawImage(image1, 0, 0, image1.width, 500);

					// DRAWING A SEMI TRANSPARENT LAYER
					context.fillStyle = "rgba(0, 0, 0, 0.5)";
					context.fillRect(0, 0, 1024, 500);

					// DRAWING THE APP LOGO
					context.drawImage(image2, 1024 / 2 - image2.width / 2, 500 / 2 - image2.height / 2 - 60, image2.width, image2.height);

					// SETTING THE FONT STYLE
					context.font = "70px FredokaOne";
					context.fillStyle = "white";

					// GETTING THE X VALUE FOR THE APP NAME
					var valueX1 = context.measureText(name.value).width;
					valueX1 = 1024 / 2 - valueX1 / 2;

					// DRAWING THE APP NAME
					context.fillText(name.value, valueX1, 380);

					// SETTING THE FONT STYLE
					context.font = "30px Spartan";
					context.fillStyle = "#8562a6";

					// GETTING THE X VALUE FOR THE APP DESCRIPTION
					var valueX2 = context.measureText(slogan.value).width;
					valueX2 = 1024 / 2 - valueX2 / 2;

					// DRAWING THE APP DESC
					context.fillText(slogan.value, valueX2, 450);

					// EXPORTING THE PICTURE AS A PNG IMAGE IN BASE64 FORMAT
					document.getElementById("finalResult").src = canvas.toDataURL("data/png");
					}

				// SETTING WHAT WILL HAPPEN WHEN THE USER TYPES IN A INPUT BOX
				document.getElementById("name").addEventListener("input",function(e){update()});
				document.getElementById("slogan").addEventListener("input",function(e){update()});
				});
