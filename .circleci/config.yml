version: 2.1

orbs:
  android: circleci/android@1.0.3

jobs:
  app-android:
    executor:
      name: android/android-machine
      resource-class: xlarge
    steps:
      - checkout
      - run:
          name: Decoding Keystore
          command: 
                if [[ "$RELEASE_KEYSTORE_BASE64" != "" ]]; then
                  base64 -d \<<< "$RELEASE_KEYSTORE_BASE64" > release-keystore.jks
                fi
      - run:
          name: Building Android App
          command: cd android && ./gradlew clean && ./gradlew bundleRelease
      - store_artifacts:
          path: android/app/build/outputs/bundle/release/app-release.aab

workflows:
  app-builder:
    jobs:
      - app-android:
          filters:
            branches:
              only: main # Commits to main branch
