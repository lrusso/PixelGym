version: 2
jobs:
  build:
    working_directory: ~/android
    environment:
      JVM_OPTS: -Xmx3200m
    docker:
      - image: circleci/android:api-29
    steps:
      - checkout
      - run:
          name: Building APK
          command: |
          cd android
          ./gradlew assembleRelease
      - store_artifacts:
          path: app/build/outputs/apk/release/app-release-unsigned.apk
