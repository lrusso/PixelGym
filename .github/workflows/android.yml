name: App Builder Android

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Setting up the environment 
        uses: actions/setup-java@v1
        with:
          java-version: 11
      - name: Decoding and writing the Keystore file
        run: echo ${{ secrets.SIGNING_KEYSTORE }} | base64 -di > android/keystore
      - name: Making Gradlew executable
        run: chmod +x ./android/gradlew
      - name: Building the Android App Bundle
        run: cd android && ./gradlew clean && ./gradlew bundleRelease
        env:
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
      - name: Attaching the Android App Bundle to this workflow
        uses: actions/upload-artifact@v2
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
      - name: Building the Android App APK
        run: cd android && ./gradlew clean && ./gradlew assembleRelease
        env:
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
      - name: Attaching the Android App APK to this workflow
        uses: actions/upload-artifact@v2
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

# ------------------------------------------------------------------------
#
# WHAT THIS WORKFLOW DOES?
#
# This workflow will build two files, app-release.apk and app-release.aab.
# Both files are going to be attached as artifacts (zip files) in the
# workflow Summary.
#
# HOW CAN I SET THIS WORKFLOW?
#
# This is a one time operation. You have to go to your repository and
# Settings/Secrets/Actions and there you have to create the following secrets:
#
# SIGNING_KEYSTORE (must contain your release keystore in Base64)
# SIGNING_KEYSTORE_PASSWORD (must be a plain text with your Keystore password)
# SIGNING_KEY_ALIAS (must be a plain text with your Key Alias)
# SIGNING_KEY_PASSWORD (must be a plain text with your Key Password)
#
# After that you have to edit the following file: android/app/build.gradle
# 
# There, you must add this:
#
#    signingConfigs {
#        release {
#            storeFile file("../keystore")
#            storePassword System.getenv("SIGNING_KEYSTORE_PASSWORD")
#            keyAlias System.getenv("SIGNING_KEY_ALIAS")
#            keyPassword System.getenv("SIGNING_KEY_PASSWORD")
#        }
#    }
#
# And also this:
#
# signingConfig signingConfigs.release
#
# To the buildType release, so you will have something similar to the setting below:
#
# buildTypes {
#        release {
#            minifyEnabled false
#            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
#            signingConfig signingConfigs.release
#        }
#    }
#
# HOW CAN I USE THIS WORKFLOW?
#
# This workflow must be trigged manually, once executed and after a few
# minutes, the workflow will be completed successfully and the two files
# (the APK and the AAB files) are going to be attached as Artifact (ZIP
# files) in the workflow Summary.
